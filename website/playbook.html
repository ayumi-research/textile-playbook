.cc-btn:not(:first-child) { background: transparent !important; color: #0a0a0a !important; border: 1px solid #0a0a0a !important; }
.cc-btn:not(:first-child):hover { background: #0a0a0a !important; color: #fff !important; }
.cc-link { color: #0a0a0a !important; text-decoration: underline; }
.cc-floating { border-radius: 0 !important; }
.cc-revoke { border-radius: 0 !important; font-family: "JetBrains Mono", ui-monospace, monospace !important; font-size: 10px !important; background: #0a0a0a; color: #fff; border: none; padding: 6px 12px; text-transform: uppercase; letter-spacing: 0.1px; }

<script>
window.dataLayer = window.dataLayer || [];
window.dataLayer.push({ 'consent': { 'default': {
  'ad_storage': 'wait',
  'analytics_storage': 'wait',
  'ad_user_data': 'granted',
  'ad_personalization': 'granted',
  'wait_for_update': 500
}}});

CookieConsent.run({
  onModalReady: function() { console.log('[CC Debug] Modal ready'); },
  onModalShow: function() { console.log('[CC Debug] Modal showing'); },
  revision: 2,
  hideFromBots: true,
  cookie: { name: 'cc_cookie_v2' },
  guiOptions: {
    consentModal: { layout: 'cloud inline', position: 'bottom right', flipButtons: false },
    preferencesModal: { layout: 'box' }
  },
  categories: {
    necessary: { enabled: true, readOnly: true },
    analytics: {}
  },
  language: {
    default: 'en',
    translations: {
      en: {
        consentModal: {
          title: 'Cookie preferences',
          description: 'This site uses Google Tag Manager to coordinate tracking cookies (currently: Matomo analytics). You can accept, reject, or customize your preferences below.',
          acceptAllBtn: 'Accept all',
          acceptNecessaryBtn: 'Reject all',
          showPreferencesBtn: 'Cookie settings',
          footer: '<a href="/privacy-policy.html" target="_blank">Privacy Policy</a>'
        },
        preferencesModal: {
          title: 'Cookie preferences',
          acceptAllBtn: 'Accept all',
          acceptNecessaryBtn: 'Reject all',
          savePreferencesBtn: 'Save preferences',
          closeIconLabel: 'Close',
          sections: [
            { title: 'Your privacy choices', description: 'You can change your preferences at any time using the Cookie Settings link in the footer.' },
            { title: 'Necessary', description: 'Required for the site to function.', linkedCategory: 'necessary' },
            { title: 'Analytics', description: 'Matomo tracks your visit (IP, pages, device) to understand how people use the site.', linkedCategory: 'analytics' }
          ]
        }
      }
    }
  },
  onFirstConsent: function() { applyConsent(); },
  onConsent: function() { applyConsent(); },
  onChange: function() { applyConsent(); },
});

function applyConsent(status) {
  var analyticsEnabled = true;
  try {
    var cookie = document.cookie;
    if (cookie.indexOf('cc_cookie') > -1) {
      var decoded = JSON.parse(decodeURIComponent(cookie.split('cc_cookie=')[1].split(';')[0]));
      if (decoded && decoded.categories) {
        analyticsEnabled = decoded.categories.indexOf('analytics') > -1;
      }
    }
  } catch(e) { analyticsEnabled = true; }
  if (status === 'revoke') { analyticsEnabled = false; }
  var analytics = analyticsEnabled ? 'granted' : 'denied';
  window.dataLayer.push({ 'consent': { 'update': {
    'analytics_storage': analytics,
    'ad_storage': 'denied',
    'ad_user_data': analytics,
    'ad_personalization': 'denied'
  }}});
}
</script>
