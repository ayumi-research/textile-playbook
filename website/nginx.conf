# /etc/nginx/sites-available/textileplaybook.conf
# Symlink: ln -s /etc/nginx/sites-available/textileplaybook.conf /etc/nginx/sites-enabled/
# Reload:  sudo nginx -t && sudo systemctl reload nginx

# Redirect apex + www on :80 to HTTPS apex
server {
    listen 80;
    listen [::]:80;
    server_name textileplaybook.com www.textileplaybook.com;

    # ACME challenge for certbot (leave before the redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://textileplaybook.com$request_uri;
    }
}

# Redirect www → apex on HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.textileplaybook.com;

    ssl_certificate     /etc/letsencrypt/live/textileplaybook.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/textileplaybook.com/privkey.pem;

    return 301 https://textileplaybook.com$request_uri;
}

# Main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name textileplaybook.com;

    root /var/www/textileplaybook;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/textileplaybook.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/textileplaybook.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Gzip (static text assets)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Long cache for JSX/JS/CSS (bust with a filename hash when you update)
    location ~* \.(?:jsx|js|css|woff2?|svg|png|jpg|jpeg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, must-revalidate";
        try_files $uri =404;
    }

    # HTML — short cache so updates propagate
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    # Clean URLs: /thanks → /thanks.html, etc.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Hide dotfiles
    location ~ /\. { deny all; }
}
